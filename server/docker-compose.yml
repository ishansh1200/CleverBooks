version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: cleverbooks-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    restart: unless-stopped

  redis:
    image: redis:7.0-alpine
    container_name: cleverbooks-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

volumes:
  mongo_data: